services:
  nuxt:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
      NUXT_PUBLIC_DIRECTUS_BASE: ${NUXT_PUBLIC_DIRECTUS_BASE:-/api/d}
      NUXT_PUBLIC_N8N_BASE: ${NUXT_PUBLIC_N8N_BASE:-/api/n}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    environment:
      DIRECTUS_UPSTREAM: ${DIRECTUS_UPSTREAM}
      N8N_UPSTREAM: ${N8N_UPSTREAM}
    expose:
      - "80"
    depends_on:
      - nuxt
    restart: unless-stopped
